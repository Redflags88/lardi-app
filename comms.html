<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
.ann-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:10px;transition:all .13s}
.ann-card:hover{border-color:var(--green-mid)}
.quick-msg{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:sticky;top:24px}
</style>
</head>
<body>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<nav id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo"><img src="/lardi-mark.png" class="logo-img" alt=""><div><div class="logo-school" id="sb-school">—</div><div class="logo-sub">School Management</div></div></div>
    <div class="sidebar-term" id="sb-term">—</div>
  </div>
  <div class="nav-group"><div class="nav-label">Main</div><a href="/dashboard.html" class="nav-item"><span class="ni">📊</span>Dashboard</a></div>
  <div class="nav-group"><div class="nav-label">Academic</div>
    <a href="/students.html"   class="nav-item"><span class="ni">🎓</span>Students</a>
    <a href="/attendance.html" class="nav-item"><span class="ni">📋</span>Attendance</a>
    <a href="/grades.html"     class="nav-item"><span class="ni">📝</span>Grades</a>
    <a href="/timetable.html"  class="nav-item"><span class="ni">🗓️</span>Timetable</a>
  </div>
  <div class="nav-group"><div class="nav-label">Operations</div>
    <a href="/staff.html"   class="nav-item"><span class="ni">👨‍🏫</span>Staff</a>
    <a href="/finance.html" class="nav-item"><span class="ni">💰</span>Finance</a>
    <a href="/library.html" class="nav-item"><span class="ni">📚</span>Library</a>
    <a href="/comms.html"   class="nav-item active"><span class="ni">💬</span>Communication</a>
  </div>
  <div class="nav-group admin-only"><div class="nav-label">Admin</div>
    <a href="/settings.html" class="nav-item"><span class="ni">⚙️</span>Settings</a>
    <a href="/export.html"   class="nav-item"><span class="ni">💾</span>Export</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card"><div class="user-av" id="sb-av">?</div><div><div class="user-name" id="sb-name">—</div><div class="user-role" id="sb-role">—</div></div></div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="var(--carbon)" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title">Communication</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="ann-badge">— announcements</span>
      <button class="btn btn-green btn-sm" onclick="openNew()">+ New Announcement</button>
    </div>
  </div>
  <div id="content">
    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">
      <div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
          <select class="fi" style="width:160px" id="aud-filter" onchange="applyFilter()"><option value="">All Audiences</option><option>everyone</option><option>parents</option><option>students</option><option>teachers</option></select>
          <select class="fi" style="width:140px" id="pri-filter" onchange="applyFilter()"><option value="">All Priorities</option><option value="info">Info</option><option value="warn">Warning</option><option value="alert">Alert</option></select>
        </div>
        <div id="ann-list"><div class="loading-center">Loading…</div></div>
      </div>
      <div>
        <div class="quick-msg">
          <div style="font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--carbon-soft);margin-bottom:14px">Quick Message</div>
          <div class="field"><label>To</label><select class="fi" id="qm-aud"><option value="everyone">Everyone</option><option value="parents">All Parents</option><option value="students">All Students</option><option value="teachers">All Teachers</option></select></div>
          <div class="field"><label>Priority</label><select class="fi" id="qm-pri"><option value="normal">🔵 Normal</option><option value="info">🟢 Info</option><option value="warn">🟡 Warning</option><option value="alert">🔴 Urgent Alert</option></select></div>
          <div class="field"><label>Title</label><input type="text" id="qm-title" placeholder="e.g. Reminder: Fee Payment"></div>
          <div class="field"><label>Message</label><textarea id="qm-body" placeholder="Type your message…" style="min-height:100px"></textarea></div>
          <button class="btn btn-green" style="width:100%" id="qm-btn" onclick="sendQuick()">📢 Send Announcement</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW ANNOUNCEMENT MODAL -->
<div class="modal-overlay" id="new-modal" onclick="if(event.target===this)closeNew()">
  <div class="modal" style="max-width:560px">
    <div class="modal-title">📢 New Announcement</div>
    <div class="form-err" id="ann-err"></div>
    <div class="field"><label>Title *</label><input type="text" id="a-title" placeholder="e.g. End of Term Exam Schedule"></div>
    <div class="field"><label>Message Body *</label><textarea id="a-body" style="min-height:120px" placeholder="Write your announcement here…"></textarea></div>
    <div class="form-row-2">
      <div class="field"><label>Audience</label><select id="a-aud"><option value="everyone">Everyone</option><option value="parents">All Parents</option><option value="students">All Students</option><option value="teachers">All Teachers</option></select></div>
      <div class="field"><label>Priority</label><select id="a-pri"><option value="normal">🔵 Normal</option><option value="info">🟢 Info</option><option value="warn">🟡 Warning</option><option value="alert">🔴 Urgent Alert</option></select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeNew()">Cancel</button><button class="btn btn-green" id="post-btn" onclick="doPost()">Post Announcement</button></div>
  </div>
</div>

<nav class="mobile-bottom-nav"><div class="mbn-items">
  <a href="/dashboard.html" class="mbn-item"><span class="mbn-icon">📊</span>Home</a>
  <a href="/students.html"  class="mbn-item"><span class="mbn-icon">🎓</span>Students</a>
  <a href="/comms.html"     class="mbn-item active"><span class="mbn-icon">💬</span>Comms</a>
  <a href="/finance.html"   class="mbn-item"><span class="mbn-icon">💰</span>Finance</a>
  <a href="#" class="mbn-item signout-btn" onclick="signOut();return false;"><span class="mbn-icon">🚪</span>Out</a>
</div></nav>
<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>
<script src="/shared.js"></script>
<script src="/auth.js"></script>
<script src="/db.js"></script>
<script>
let PROF=null, ALL=[], FIL=[];
const PRI_COL={normal:'#1565C0',info:'#0F6E56',warn:'#D97706',alert:'#DC2626'};
const PRI_LBL={normal:'🔵 NORMAL',info:'🟢 INFO',warn:'🟡 WARNING',alert:'🔴 ALERT'};
const AUD_ICONS={everyone:'🌍',parents:'👨‍👧',students:'🎓',teachers:'👨‍🏫'};

(async()=>{
  try {
    const {profile}=await requireAuth(['admin','teacher']);
    await loadSchoolSettings();
    PROF=profile;
    initSidebar(profile);
    await loadAll();
    if(new URLSearchParams(location.search).get('action')==='new') openNew();
  } catch(e){console.error('Comms init:',e);}
})();

async function loadAll(){
  document.getElementById('ann-list').innerHTML='<div class="loading-center">Loading…</div>';
  ALL=await getAnnouncements(30);
  document.getElementById('ann-badge').textContent=`${ALL.length} announcements`;
  FIL=ALL; rend();
}

function applyFilter(){
  const aud=document.getElementById('aud-filter').value;
  const pri=document.getElementById('pri-filter').value;
  FIL=ALL.filter(a=>(!aud||a.audience===aud)&&(!pri||a.priority===pri));
  rend();
}

function rend(){
  if(!FIL.length){document.getElementById('ann-list').innerHTML='<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">No announcements yet</div><div class="empty-sub">Post your first announcement using the button above</div></div>';return;}
  const isAdmin=PROF?.role==='admin';
  document.getElementById('ann-list').innerHTML=FIL.map(a=>{
    const col=PRI_COL[a.priority]||PRI_COL.normal;
    return`<div class="ann-card" style="border-left:4px solid ${col}" id="ann-${a.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <span style="font-size:.65rem;font-weight:700;letter-spacing:.1em;color:${col};background:${col}20;padding:2px 8px;border-radius:var(--r-full)">${PRI_LBL[a.priority]||PRI_LBL.normal}</span>
        ${isAdmin?`<button onclick="deleteAnn('${a.id}','${(a.title||'').replace(/'/g,"\\'")}',this)" title="Delete" style="width:26px;height:26px;border-radius:7px;border:1px solid var(--border-med);background:none;cursor:pointer;font-size:.72rem;color:var(--carbon-soft)" onmouseover="this.style.background='var(--red-light)';this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.background='none';this.style.borderColor='var(--border-med)';this.style.color='var(--carbon-soft)'">✕</button>`:''}
      </div>
      <div style="font-size:.92rem;font-weight:600;color:var(--carbon);margin-bottom:4px">${a.title}</div>
      <div style="font-size:.82rem;color:var(--carbon-mid);line-height:1.65;margin-bottom:10px">${a.body}</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="badge bg-gray">${AUD_ICONS[a.audience]||'🌍'} ${a.audience||'everyone'}</span>
        <span style="font-size:.72rem;color:var(--carbon-soft);margin-left:auto">${formatDate(a.createdAt)}</span>
      </div>
    </div>`;
  }).join('');
}

async function deleteAnn(id,title){
  if(!confirm(`Delete "${title}"?\nThis cannot be undone.`))return;
  try{
    await db.collection('announcements').doc(id).delete();
    const el=document.getElementById('ann-'+id);if(el){el.style.opacity='.3';setTimeout(()=>el.remove(),300);}
    ALL=ALL.filter(a=>a.id!==id);FIL=FIL.filter(a=>a.id!==id);
    document.getElementById('ann-badge').textContent=`${ALL.length} announcements`;
    showToast('Announcement deleted','ok');
  }catch(e){showToast('Error deleting','err');}
}

function openNew(){document.getElementById('new-modal').classList.add('open');}
function closeNew(){document.getElementById('new-modal').classList.remove('open');document.getElementById('ann-err').className='form-err';}

async function doPost(){
  const title=document.getElementById('a-title').value.trim(),body=document.getElementById('a-body').value.trim();
  const err=document.getElementById('ann-err');err.className='form-err';
  if(!title||!body){err.textContent='Title and message are required.';err.className='form-err show';return;}
  const btn=document.getElementById('post-btn');btn.disabled=true;btn.textContent='Posting…';
  const res=await addAnnouncement({title,body,audience:document.getElementById('a-aud').value,classKey:null,priority:document.getElementById('a-pri').value,channel:'in-app',createdBy:PROF.name||PROF.uid});
  btn.disabled=false;btn.textContent='Post Announcement';
  if(!res.success){err.textContent=res.error;err.className='form-err show';return;}
  showToast('✓ Announcement posted','ok');closeNew();['a-title','a-body'].forEach(i=>document.getElementById(i).value='');await loadAll();
}

async function sendQuick(){
  const title=document.getElementById('qm-title').value.trim(),body=document.getElementById('qm-body').value.trim();
  if(!title||!body){showToast('Enter a title and message','err');return;}
  const btn=document.getElementById('qm-btn');btn.disabled=true;btn.textContent='Sending…';
  const res=await addAnnouncement({title,body,audience:document.getElementById('qm-aud').value,classKey:null,priority:document.getElementById('qm-pri').value||'normal',channel:'in-app',createdBy:PROF.name||PROF.uid});
  btn.disabled=false;btn.textContent='📢 Send Announcement';
  if(res.success){showToast('✓ Message sent','ok');['qm-title','qm-body'].forEach(i=>document.getElementById(i).value='');await loadAll();}
  else showToast(res.error||'Error','err');
}
</script>
</body>
</html>
