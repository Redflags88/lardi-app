<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1a6b3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sign In — Lardi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--green);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.brand-logo{width:42px;height:42px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.brand-name{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--green)}
.brand-sub{font-size:.76rem;color:var(--carbon-soft);margin-top:1px}
.lbl{display:block;font-size:.64rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--carbon-mid);margin-bottom:6px}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--border-med);border-radius:10px;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--carbon);outline:none;transition:border-color .15s;margin-bottom:14px}
.inp:focus{border-color:var(--green)}
.btn-login{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:background .13s;margin-top:4px}
.btn-login:hover{background:var(--green-dark)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.err{background:var(--red-light);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:9px 12px;font-size:.8rem;color:#b91c1c;margin-bottom:12px;display:none}
.err.show{display:block}
.ok{background:var(--green-light);border:1px solid rgba(26,107,60,.2);border-radius:8px;padding:9px 12px;font-size:.8rem;color:var(--green);margin-bottom:12px;display:none}
.ok.show{display:block}
.link{font-size:.78rem;color:var(--green);cursor:pointer;text-align:right;margin-top:-8px;margin-bottom:16px;display:block}
.link:hover{text-decoration:underline}
.demo-strip{background:var(--cream);border-radius:10px;padding:12px 14px;margin-top:20px}
.demo-lbl{font-size:.6rem;font-weight:600;letter-spacing:2px;color:var(--carbon-soft);text-transform:uppercase;margin-bottom:8px}
.demo-pills{display:flex;flex-wrap:wrap;gap:6px}
.demo-pill{padding:5px 12px;background:#fff;border:1px solid var(--border-med);border-radius:99px;font-size:.72rem;cursor:pointer;color:var(--carbon-mid);transition:all .13s}
.demo-pill:hover{border-color:var(--green);color:var(--green)}
.footer{font-size:.7rem;color:rgba(255,255,255,.6);text-align:center;margin-top:20px;line-height:1.6}
.footer a{color:rgba(255,255,255,.8);text-decoration:underline}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">🏫</div>
      <div>
        <div class="brand-name" id="brand-name">Lardi</div>
        <div class="brand-sub">School Management System</div>
      </div>
    </div>

    <div class="err" id="err"></div>

    <div id="login-form">
      <label class="lbl">Email Address</label>
      <input type="email" class="inp" id="email" placeholder="admin@yourschool.edu.gh" autocomplete="email" inputmode="email">
      <label class="lbl">Password</label>
      <input type="password" class="inp" id="pass" placeholder="••••••••" autocomplete="current-password">
      <span class="link" onclick="showForgot()">Forgot password?</span>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in →</button>
    </div>

    <div id="forgot-form" style="display:none">
      <p style="font-size:.84rem;color:var(--carbon-soft);margin-bottom:14px;line-height:1.6">Enter your email and we will send a password reset link.</p>
      <div class="ok" id="reset-ok"></div>
      <label class="lbl">Email Address</label>
      <input type="email" class="inp" id="reset-email" placeholder="your@email.com" inputmode="email">
      <button class="btn-login" onclick="doReset()">Send Reset Email</button>
      <span class="link" onclick="showLogin()">← Back to sign in</span>
    </div>

    <div class="demo-strip">
      <div class="demo-lbl">Demo accounts</div>
      <div class="demo-pills">
        <span class="demo-pill" onclick="fill('admin@lardigh.com','Demo@2025')">👤 Admin</span>
        <span class="demo-pill" onclick="fill('teacher@lardigh.com','Demo@2025')">👨‍🏫 Teacher</span>
        <span class="demo-pill" onclick="fill('parent@lardigh.com','Demo@2025')">👨‍👧 Parent</span>
        <span class="demo-pill" onclick="fill('student@lardigh.com','Demo@2025')">🎓 Student</span>
      </div>
    </div>
  </div>
  <div class="footer">
    <a href="/privacy.html">Privacy Policy</a> · Protected under Ghana Data Protection Act 2012
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>
<script src="/shared.js"></script>
<script src="/auth.js"></script>
<script src="/db.js"></script>
<script>
// Redirect if already logged in
auth.onAuthStateChanged(async user => {
  if (!user) return;
  try {
    await loadSchoolSettings();
    document.getElementById('brand-name').textContent = SCHOOL.name || 'Lardi';
    const snap = await db.collection('users').doc(user.uid).get();
    const role = snap.exists ? snap.data().role : 'teacher';
    const portals = { admin:'dashboard.html', teacher:'dashboard.html', parent:'parent.html', student:'student.html' };
    window.location.href = portals[role] || 'dashboard.html';
  } catch(e) { window.location.href = 'dashboard.html'; }
});

function fill(e, p) {
  document.getElementById('email').value = e;
  document.getElementById('pass').value  = p;
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const err   = document.getElementById('err');
  const btn   = document.getElementById('login-btn');
  err.className = 'err';
  if (!email || !pass) { err.textContent='Enter your email and password.'; err.className='err show'; return; }
  btn.disabled = true;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="animation:spin .7s linear infinite;vertical-align:-3px"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" stroke-linecap="round"/></svg> Signing in…';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    const msgs = { 'auth/user-not-found':'No account with this email.', 'auth/wrong-password':'Incorrect password.', 'auth/invalid-email':'Invalid email.', 'auth/invalid-credential':'Invalid email or password.', 'auth/too-many-requests':'Too many attempts. Try again later.' };
    err.textContent = msgs[e.code] || 'Sign in failed. Please try again.';
    err.className   = 'err show';
    btn.disabled    = false;
    btn.textContent = 'Sign in →';
  }
}

function showForgot() { document.getElementById('login-form').style.display='none'; document.getElementById('forgot-form').style.display='block'; }
function showLogin()   { document.getElementById('forgot-form').style.display='none'; document.getElementById('login-form').style.display='block'; }

async function doReset() {
  const email = document.getElementById('reset-email').value.trim();
  const err   = document.getElementById('err');
  const ok    = document.getElementById('reset-ok');
  if (!email) { err.textContent='Enter your email.'; err.className='err show'; return; }
  try {
    await auth.sendPasswordResetEmail(email);
    ok.textContent='Reset email sent — check your inbox.'; ok.className='ok show';
    err.className='err';
  } catch(e) { err.textContent='Could not send reset email.'; err.className='err show'; }
}

document.addEventListener('keydown', e => { if (e.key==='Enter' && document.getElementById('login-form').style.display!=='none') doLogin(); });
</script>
</body>
</html>
