<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1a6b3c"><meta name="apple-mobile-web-app-capable" content="yes">
<title>Staff — Lardi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.staff-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .13s;text-align:center}
.staff-card:hover{border-color:var(--green-mid);box-shadow:var(--shadow-sm)}
.staff-av{width:52px;height:52px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.2rem;font-weight:700;color:var(--green);margin:0 auto 12px}
.sub-check{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--carbon-mid);padding:4px 0}
.sub-check input{width:15px;height:15px;accent-color:var(--green)}
</style>
</head>
<body>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<nav id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo"><img src="/lardi-mark.png" class="logo-img" alt=""><div><div class="logo-school" id="sb-school">—</div><div class="logo-sub">School Management</div></div></div>
    <div class="sidebar-term" id="sb-term">—</div>
  </div>
  <div class="nav-group"><div class="nav-label">Main</div><a href="/dashboard.html" class="nav-item"><span class="ni">📊</span>Dashboard</a></div>
  <div class="nav-group"><div class="nav-label">Academic</div>
    <a href="/students.html"   class="nav-item"><span class="ni">🎓</span>Students</a>
    <a href="/attendance.html" class="nav-item"><span class="ni">📋</span>Attendance</a>
    <a href="/grades.html"     class="nav-item"><span class="ni">📝</span>Grades</a>
    <a href="/timetable.html"  class="nav-item"><span class="ni">🗓️</span>Timetable</a>
  </div>
  <div class="nav-group"><div class="nav-label">Operations</div>
    <a href="/staff.html"   class="nav-item active"><span class="ni">👨‍🏫</span>Staff</a>
    <a href="/finance.html" class="nav-item"><span class="ni">💰</span>Finance</a>
    <a href="/library.html" class="nav-item"><span class="ni">📚</span>Library</a>
    <a href="/comms.html"   class="nav-item"><span class="ni">💬</span>Communication</a>
  </div>
  <div class="nav-group admin-only"><div class="nav-label">Admin</div>
    <a href="/settings.html" class="nav-item"><span class="ni">⚙️</span>Settings</a>
    <a href="/export.html"   class="nav-item"><span class="ni">💾</span>Export</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card"><div class="user-av" id="sb-av">?</div><div><div class="user-name" id="sb-name">—</div><div class="user-role" id="sb-role">—</div></div></div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="var(--carbon)" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title">Staff</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="total-badge">—</span>
      <button class="btn btn-green btn-sm admin-only" id="add-staff-btn" onclick="openAdd()">+ Add Staff</button>
    </div>
  </div>
  <div id="content">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
      <div class="search-bar" style="flex:1;min-width:200px"><span class="search-bar-icon">🔍</span><input type="text" id="search-input" placeholder="Search name, role or department…" oninput="applyFilter()"></div>
      <select class="fi" style="width:170px" id="dept-filter" onchange="applyFilter()"><option value="">All Departments</option></select>
    </div>
    <div id="staff-grid"><div class="loading-center">Loading staff…</div></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <div class="modal-title">👨‍🏫 Add New Staff Member</div>
    <div class="form-err" id="add-err"></div>
    <div class="field"><label>Full Name *</label><input type="text" id="f-name" placeholder="e.g. Mrs. Abena Mensah"></div>
    <div class="form-row-2">
      <div class="field"><label>Role *</label><select id="f-role"></select></div>
      <div class="field"><label>Department</label><select id="f-dept"></select></div>
    </div>
    <div class="form-row-2">
      <div class="field"><label>Phone</label><input type="tel" id="f-phn" placeholder="+233 24 XXX XXXX"></div>
      <div class="field"><label>Email</label><input type="email" id="f-email" placeholder="staff@school.edu.gh"></div>
    </div>
    <div class="field"><label>Monthly Salary (GHS)</label><input type="number" id="f-salary" placeholder="e.g. 4500"></div>
    <div class="field"><label>Subjects Taught</label><div id="sub-checks" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--cream);border-radius:var(--r-md);padding:12px;border:1.5px solid var(--border-med)"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeAdd()">Cancel</button><button class="btn btn-green" id="save-staff-btn" onclick="doAdd()">Add Staff</button></div>
  </div>
</div>

<!-- STAFF DRAWER -->
<div class="drawer-overlay" id="dro" onclick="closeDr()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <div class="av av-lg av-green" id="dr-av">?</div>
    <div><div style="font-size:.98rem;font-weight:600;color:var(--carbon)" id="dr-name">—</div><div style="font-size:.73rem;color:var(--carbon-soft)" id="dr-meta">—</div></div>
    <div class="drawer-close" onclick="closeDr()">✕</div>
  </div>
  <div class="drawer-body" id="dr-body"><div class="loading-center">Loading…</div></div>
</div>

<nav class="mobile-bottom-nav"><div class="mbn-items">
  <a href="/dashboard.html" class="mbn-item"><span class="mbn-icon">📊</span>Home</a>
  <a href="/students.html"  class="mbn-item"><span class="mbn-icon">🎓</span>Students</a>
  <a href="/staff.html"     class="mbn-item active"><span class="mbn-icon">👨‍🏫</span>Staff</a>
  <a href="/finance.html"   class="mbn-item"><span class="mbn-icon">💰</span>Finance</a>
  <a href="#" class="mbn-item signout-btn" onclick="signOut();return false;"><span class="mbn-icon">🚪</span>Out</a>
</div></nav>
<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js?v=2"></script>
<script src="/shared.js?v=2"></script>
<script src="/auth.js?v=2"></script>
<script src="/db.js?v=2"></script>
<script>
let PROF=null, ALL=[], FIL=[];

(async () => {
  try {
    const { profile } = await requireAuth(['admin','teacher']);
    await loadSchoolSettings();
    PROF=profile;
    initSidebar(profile);

    document.getElementById('dept-filter').innerHTML='<option value="">All Departments</option>'+DEPARTMENTS.map(d=>`<option value="${d}">${d}</option>`).join('');
    document.getElementById('f-role').innerHTML=STAFF_ROLES.map(r=>`<option value="${r}">${r}</option>`).join('');
    document.getElementById('f-dept').innerHTML=DEPARTMENTS.map(d=>`<option value="${d}">${d}</option>`).join('');
    document.getElementById('sub-checks').innerHTML=SUBJECTS.map(s=>`<label class="sub-check"><input type="checkbox" value="${s.key}"> ${s.icon} ${s.label}</label>`).join('');

    await loadAll();
  } catch(e) { console.error('Staff init:', e); }
})();

async function loadAll(){
  document.getElementById('staff-grid').innerHTML='<div class="loading-center">Loading staff…</div>';
  ALL=await getStaff({});
  document.getElementById('total-badge').textContent=`${ALL.length} staff`;
  applyFilter();
}

function applyFilter(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const dept=document.getElementById('dept-filter').value;
  FIL=ALL.filter(s=>(!q||(s.name||'').toLowerCase().includes(q)||(s.role||'').toLowerCase().includes(q)||(s.department||'').toLowerCase().includes(q))&&(!dept||s.department===dept));
  rend();
}

function rend(){
  if(!FIL.length){document.getElementById('staff-grid').innerHTML='<div class="empty-state"><div class="empty-icon">👨‍🏫</div><div class="empty-title">No staff yet</div><div class="empty-sub">Click <strong>Add Staff</strong> to add your first team member.</div></div>';return;}
  document.getElementById('staff-grid').innerHTML=`<div class="staff-grid">${FIL.map(s=>`
    <div class="staff-card" onclick="openDr('${s.id}')">
      <div class="staff-av">${getInitials(s.name)}</div>
      <div style="font-size:.92rem;font-weight:600;color:var(--carbon)">${s.name}</div>
      <div style="font-size:.74rem;color:var(--carbon-soft);margin-top:2px">${s.role}</div>
      <div style="font-size:.7rem;color:var(--green);font-weight:500;margin-top:6px">${s.department||'—'}</div>
      ${s.subjects?.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px">${s.subjects.slice(0,3).map(k=>`<span class="badge bg-green">${getSubjectLabel(k).split(' ')[0]}</span>`).join('')}${s.subjects.length>3?`<span class="badge bg-gray">+${s.subjects.length-3}</span>`:''}</div>`:''}
    </div>`).join('')}</div>`;
}

function openAdd(){document.getElementById('add-modal').classList.add('open');}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');document.getElementById('add-err').className='form-err';}

async function doAdd(){
  const name=document.getElementById('f-name').value.trim();
  const err=document.getElementById('add-err'); err.className='form-err';
  if(!name){err.textContent='Name is required.';err.className='form-err show';return;}
  const subs=[...document.querySelectorAll('#sub-checks input:checked')].map(c=>c.value);
  const btn=document.getElementById('save-staff-btn');btn.disabled=true;btn.textContent='Adding…';
  const res=await addStaff({name,role:document.getElementById('f-role').value,department:document.getElementById('f-dept').value,subjects:subs,phone:document.getElementById('f-phn').value.trim(),email:document.getElementById('f-email').value.trim(),salary:document.getElementById('f-salary').value});
  btn.disabled=false;btn.textContent='Add Staff';
  if(!res.success){err.textContent=res.error;err.className='form-err show';return;}
  showToast(`✓ ${name} added`,'ok');
  closeAdd();['f-name','f-phn','f-email','f-salary'].forEach(i=>document.getElementById(i).value='');
  document.querySelectorAll('#sub-checks input').forEach(c=>c.checked=false);
  await loadAll();
}

async function openDr(id){
  document.getElementById('drawer').classList.add('open');document.getElementById('dro').classList.add('open');
  document.getElementById('dr-body').innerHTML='<div class="loading-center">Loading…</div>';
  const s=await getStaffById(id);if(!s)return;
  document.getElementById('dr-av').textContent=getInitials(s.name);
  document.getElementById('dr-name').textContent=s.name;
  document.getElementById('dr-meta').textContent=`${s.staffId||id} · ${s.role}`;
  document.getElementById('dr-body').innerHTML=`
    <div class="dr-sec"><div class="dr-lbl">Details</div>
      ${ir('Staff ID',s.staffId||id)}${ir('Role',s.role)}${ir('Department',s.department||'—')}${ir('Phone',s.phone||'—')}${ir('Email',s.email||'—')}${ir('Salary',s.salary?fmtGHS(s.salary):'—')}
    </div>
    ${s.subjects?.length?`<div class="dr-sec"><div class="dr-lbl">Subjects</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${s.subjects.map(k=>`<span class="badge bg-green">${SUBJECTS.find(x=>x.key===k)?.icon||''} ${getSubjectLabel(k)}</span>`).join('')}</div></div>`:''}`;
}
function ir(k,v){return`<div class="ir"><span class="ir-k">${k}</span><span class="ir-v">${v||'—'}</span></div>`;}
function closeDr(){document.getElementById('drawer').classList.remove('open');document.getElementById('dro').classList.remove('open');}
</script>
</body>
</html>
