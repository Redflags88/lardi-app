<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lardi">
<meta name="mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#1a6b3c">
<title>Student Portal — Lardi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script src="/school.config.js"></script>
<script>(function(c){document.documentElement.style.setProperty('--green',c.color);var t=document.querySelector('meta[name="theme-color"]');if(t)t.content=c.color;var a=document.querySelector('meta[name="apple-mobile-web-app-title"]');if(a)a.content=c.appName;})(SCHOOL_CONFIG);</script>
<style>
.stu-nav{width:240px;flex-shrink:0;background:var(--green-dark);display:flex;flex-direction:column;position:fixed;left:-100%;top:0;bottom:0;z-index:400;overflow-y:auto;transition:left .25s ease;-webkit-overflow-scrolling:touch}@media(min-width:961px){.stu-nav{position:relative;left:0;height:100vh}}
.stu-main{flex:1;display:flex;flex-direction:column;min-height:100vh}@media(min-width:961px){.stu-main{height:100vh;overflow:hidden}}
.tt-mini{display:grid;grid-template-columns:70px repeat(5,1fr);gap:3px;font-size:.7rem}
.tt-mini-hd{background:var(--green-dark);color:#fff;padding:5px 8px;border-radius:4px;text-align:center;font-weight:600}
.tt-mini-time{background:var(--cream);padding:5px 8px;border-radius:4px;color:var(--carbon-soft);text-align:right;font-size:.65rem}
.tt-mini-cell{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:5px 8px;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.65rem;color:var(--carbon-soft)}
.tt-mini-cell.filled{background:var(--green-light);color:var(--green);font-weight:600;border-color:rgba(26,107,60,.2)}
.tt-mini-break{background:var(--gold-light);color:var(--gold);font-weight:600;font-size:.62rem;display:flex;align-items:center;justify-content:center;border-radius:4px}
.grade-bar{height:5px;background:rgba(28,28,28,.08);border-radius:10px;margin-top:3px;overflow:hidden}
.grade-fill{height:100%;border-radius:10px}
.today-hl{border:2px solid var(--green)!important;background:var(--green-light)!important}
</style>
</head>
<body>
<div id="snav-overlay" onclick="closeStudentNav()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:399"></div>
<nav class="stu-nav" id="stu-nav">
  <div class="sidebar-logo"><div class="logo-mark"><div class="logo-pin" style="background:none;padding:0"><img src="/lardi-mark.png?v=3" style="width:36px;height:36px;object-fit:contain;border-radius:6px" alt="Lardi"></div><div><div class="logo-name">Lardi</div><div class="logo-sub" id="nav-school">Lardi Demo School</div></div></div></div>
  <div class="sidebar-school"><div class="school-name">Student Portal</div><div class="school-term" id="nav-term">Term 2</div></div>
  <div style="padding:14px 12px">
    <div style="background:rgba(255,255,255,.07);border-radius:12px;padding:12px;text-align:center">
      <div class="user-av" style="margin:0 auto 8px;width:44px;height:44px;font-size:1rem" id="p-av">?</div>
      <div style="font-size:.86rem;font-weight:600;color:#fff" id="p-name">Loading…</div>
      <div style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:2px" id="p-class">—</div>
    </div>
  </div>
  <div class="nav-section">My Dashboard</div>
  <a class="nav-item active" onclick="showView('home',this)" href="#"><span class="nav-icon">🏠</span> Overview</a>
  <a class="nav-item" onclick="showView('grades',this)" href="#"><span class="nav-icon">📝</span> My Grades</a>
  <a class="nav-item" onclick="showView('attendance',this)" href="#"><span class="nav-icon">📋</span> Attendance</a>
  <a class="nav-item" onclick="showView('timetable',this)" href="#"><span class="nav-icon">🗓️</span> Timetable</a>
  <a class="nav-item" onclick="showView('notices',this)" href="#"><span class="nav-icon">📢</span> Notices</a>
  <div class="sidebar-bottom">
    <div class="sidebar-signout" onclick="signOut()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign out</div>
  </div>
</nav>

<div class="stu-main">
  <div id="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openStudentNav()"><svg viewBox="0 0 24 24" fill="none" stroke="var(--carbon)" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title" id="page-title">My Dashboard</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="page-badge">Loading…</span>
    </div>
  </div>
  <div id="content" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:90px;">
    <div class="loading-center">Loading your dashboard…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script><script src="/shared.js"></script><script src="/auth.js"></script><script src="/db.js"></script>
<script>
let PROF=null,STUDENT=null,GRADES=[],ATT=[],TT=[],NOTICES=[];
const TERM=SCHOOL.term,YEAR=SCHOOL.year;
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const PERIODS=[{label:'Period 1',start:'07:30'},{label:'Period 2',start:'08:15'},{label:'Break',start:'09:00'},{label:'Period 3',start:'09:30'},{label:'Period 4',start:'10:15'},{label:'Lunch',start:'11:00'},{label:'Period 5',start:'11:45'},{label:'Period 6',start:'12:30'}];
const BREAKS=['Break','Lunch'];
const TODAY_DAY=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];

(async()=>{
  const {user,profile}=await requireAuth(['student','admin']);
  PROF=profile;
  document.getElementById('p-av').textContent=getInitials(profile.name);
  document.getElementById('p-name').textContent=profile.name;
  document.getElementById('nav-school').textContent=SCHOOL.name;
  document.getElementById('nav-term').textContent=`${SCHOOL.term} · ${SCHOOL.year}`;

  // Find student record — check profile.studentId first (set by admin),
  // then fall back to email match, then demo fallback (first student with grades)
  let STUDENT_DOC = null;
  if(profile.studentId){
    const d=await db.collection('students').doc(profile.studentId).get();
    if(d.exists) STUDENT_DOC={id:d.id,...d.data()};
  }
  if(!STUDENT_DOC){
    const snap=await db.collection('students').where('email','==',profile.email).limit(1).get();
    if(!snap.empty) STUDENT_DOC={id:snap.docs[0].id,...snap.docs[0].data()};
  }
  if(!STUDENT_DOC){
    // Demo fallback — grab GA-2024-0001 which has full seed data
    const d=await db.collection('students').doc('GA-2024-0001').get();
    if(d.exists) STUDENT_DOC={id:d.id,...d.data()};
  }
  if(!STUDENT_DOC){
    const snap=await db.collection('students').limit(1).get();
    if(!snap.empty) STUDENT_DOC={id:snap.docs[0].id,...snap.docs[0].data()};
  }
  STUDENT=STUDENT_DOC;

  if(!STUDENT){document.getElementById('content').innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">Profile not found</div><div class="empty-sub">Contact the school office to link your account</div></div>';return;}
  document.getElementById('p-class').textContent=getClassLabel(STUDENT.classKey);
  document.getElementById('page-badge').textContent=`${STUDENT.studentId} · ${getClassLabel(STUDENT.classKey)}`;

  // Load all data in parallel
  [GRADES,ATT,NOTICES]=await Promise.all([
    getStudentGrades(STUDENT.id,TERM,YEAR),
    getStudentAttendance(STUDENT.id),
    getAnnouncements(10)
  ]);
  TT=await getTimetable(STUDENT.classKey,TERM,YEAR);
  showHome();
})();

function showView(view,el){
  document.querySelectorAll('.stu-nav .nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  if(view==='home') showHome();
  else if(view==='grades') showGrades();
  else if(view==='attendance') showAttendance();
  else if(view==='timetable') showTimetable();
  else if(view==='notices') showNotices();
}

function showHome(){
  if(!STUDENT) return;
  document.getElementById('page-title').textContent='My Dashboard';
  const attP=ATT.filter(a=>a.status==='present').length,attR=ATT.length?pct(attP,ATT.length):0;
  const avg=GRADES.length?(GRADES.reduce((t,g)=>t+g.score,0)/GRADES.length).toFixed(1):null;
  const todaySlots=TT.filter(s=>s.day===TODAY_DAY);
  document.getElementById('content').innerHTML=`
    <div style="font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--carbon);margin-bottom:4px">Good morning, ${STUDENT.firstName}! 👋</div>
    <div style="font-size:.84rem;color:var(--carbon-soft);margin-bottom:24px">${new Date().toLocaleDateString('en-GH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="stat-card"><div class="stat-icon si-blue">📝</div><div class="stat-label">Current Average</div><div class="stat-value">${avg||'—'}${avg?'%':''}</div><div class="stat-sub ${avg>=50?'up':'down'}">${avg?getGrade(parseFloat(avg)).remark:TERM}</div></div>
      <div class="stat-card"><div class="stat-icon si-green">📋</div><div class="stat-label">Attendance</div><div class="stat-value">${attR}%</div><div class="stat-sub ${attR>=80?'up':'down'}">${attP} days present</div></div>
      <div class="stat-card"><div class="stat-icon si-gold">🏫</div><div class="stat-label">My Class</div><div class="stat-value" style="font-size:1.1rem">${getClassLabel(STUDENT.classKey)}</div><div class="stat-sub neutral">${STUDENT.studentId}</div></div>
    </div>

    ${todaySlots.length?`<div class="card" style="margin-bottom:16px">
      <div class="card-hd"><span class="card-title">📅 Today's Schedule — ${TODAY_DAY}</span></div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${todaySlots.sort((a,b)=>a.startTime.localeCompare(b.startTime)).map(s=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--green-light);border-radius:var(--r-md)">
          <span style="font-size:.72rem;font-family:monospace;color:var(--carbon-soft);width:40px">${s.startTime}</span>
          <span style="font-size:.84rem;font-weight:600;color:var(--green)">${SUBJECTS.find(x=>x.key===s.subjectKey)?.icon||'📚'} ${getSubjectLabel(s.subjectKey)}</span>
          ${s.staffName?`<span style="font-size:.72rem;color:var(--carbon-soft);margin-left:auto">with ${s.staffName}</span>`:''}
        </div>`).join('')}
      </div>
    </div>`:''}

    ${NOTICES.length?`<div class="card">
      <div class="card-hd"><span class="card-title">📢 Latest Notices</span></div>
      ${NOTICES.slice(0,3).map(a=>`<div style="padding:10px 0;border-bottom:1px solid rgba(28,28,28,.05)">
        <div style="font-size:.86rem;font-weight:600;color:var(--carbon);margin-bottom:3px">${a.title}</div>
        <div style="font-size:.78rem;color:var(--carbon-soft);line-height:1.5">${a.body.slice(0,120)}${a.body.length>120?'…':''}</div>
        <div style="font-size:.68rem;color:var(--carbon-faint);margin-top:4px">${formatDate(a.createdAt)}</div>
      </div>`).join('')}
    </div>`:''}`;
}

function showGrades(){
  document.getElementById('page-title').textContent='My Grades';
  const avg=GRADES.length?(GRADES.reduce((t,g)=>t+g.score,0)/GRADES.length).toFixed(1):null;
  document.getElementById('page-badge').textContent=avg?`Avg: ${avg}% · ${getGrade(parseFloat(avg)).grade}`:'No grades yet';
  document.getElementById('content').innerHTML=GRADES.length?`
    ${avg?`<div style="background:${getGrade(parseFloat(avg)).color}18;border:1.5px solid ${getGrade(parseFloat(avg)).color}40;border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px">
      <div style="font-size:2rem;font-weight:800;color:${getGrade(parseFloat(avg)).color}">${avg}%</div>
      <div><div style="font-size:.92rem;font-weight:700;color:var(--carbon)">${getGrade(parseFloat(avg)).grade} — ${getGrade(parseFloat(avg)).remark}</div><div style="font-size:.78rem;color:var(--carbon-soft);margin-top:2px">${TERM} Overall Average</div></div>
    </div>`:''}
    <div class="card">
      <div class="card-hd"><span class="card-title">Subject Breakdown — ${TERM}</span></div>
      ${GRADES.map(g=>`<div style="padding:10px 0;border-bottom:1px solid rgba(28,28,28,.05)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:.88rem;font-weight:500">${getSubjectLabel(g.subjectKey)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.88rem;font-weight:700;color:${getGrade(g.score).color}">${g.score}%</span>
            <span class="badge" style="background:${getGrade(g.score).color}20;color:${getGrade(g.score).color}">${g.grade}</span>
          </div>
        </div>
        <div class="grade-bar"><div class="grade-fill" style="width:${g.score}%;background:${getGrade(g.score).color}"></div></div>
      </div>`).join('')}
    </div>`
  :'<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No grades yet</div><div class="empty-sub">Your grades will appear here once your teacher enters them</div></div>';
}

function showAttendance(){
  document.getElementById('page-title').textContent='My Attendance';
  const attP=ATT.filter(a=>a.status==='present').length,attA=ATT.filter(a=>a.status==='absent').length,attL=ATT.filter(a=>a.status==='late').length;
  const attR=ATT.length?pct(attP,ATT.length):0;
  document.getElementById('page-badge').textContent=`${attR}% attendance`;
  const cal=ATT.slice(0,28).map(a=>`<div style="aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:600;background:${a.status==='present'?'var(--green-light)':a.status==='absent'?'var(--red-light)':'var(--amber-light)'};color:${a.status==='present'?'var(--green)':a.status==='absent'?'var(--red)':'var(--amber)'}" title="${a.date}">${a.date.slice(8)}</div>`).join('');
  document.getElementById('content').innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="stat-card"><div class="stat-icon si-green">✅</div><div class="stat-label">Rate</div><div class="stat-value">${attR}%</div></div>
      <div class="stat-card"><div class="stat-icon si-green">🟢</div><div class="stat-label">Present</div><div class="stat-value">${attP}</div></div>
      <div class="stat-card"><div class="stat-icon si-red">🔴</div><div class="stat-label">Absent</div><div class="stat-value">${attA}</div></div>
      <div class="stat-card"><div class="stat-icon si-gold">🟡</div><div class="stat-label">Late</div><div class="stat-value">${attL}</div></div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-title">Calendar — ${TERM}</span><span style="font-size:.72rem;color:var(--carbon-soft)">${ATT.length} school days</span></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px">${cal||'<span style="color:var(--carbon-soft);font-size:.78rem">No records yet</span>'}</div>
      <div style="display:flex;gap:12px;font-size:.74rem">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:var(--green-light)"></div>Present</div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:var(--red-light)"></div>Absent</div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:var(--amber-light)"></div>Late</div>
      </div>
    </div>`;
}

function showTimetable(){
  document.getElementById('page-title').textContent='My Timetable';
  document.getElementById('page-badge').textContent=`${getClassLabel(STUDENT?.classKey)} · ${TERM}`;
  const TT_MAP={};TT.forEach(s=>TT_MAP[`${s.day}_${s.startTime}`]=s);
  let html=`<div class="card"><div class="tt-mini" style="gap:4px">
    <div style="font-size:.64rem;color:var(--carbon-soft)"></div>
    ${DAYS.map(d=>`<div class="tt-mini-hd" style="${d===TODAY_DAY?'background:var(--green)':''}">${d.slice(0,3)}</div>`).join('')}`;
  PERIODS.forEach(p=>{
    const isBreak=BREAKS.includes(p.label);
    html+=`<div class="tt-mini-time">${p.start}</div>`;
    DAYS.forEach(d=>{
      if(isBreak){html+=`<div class="tt-mini-break" style="min-height:36px">${p.label}</div>`;return;}
      const slot=TT_MAP[`${d}_${p.start}`];
      const todayHl=d===TODAY_DAY?' today-hl':'';
      html+=`<div class="tt-mini-cell${slot?' filled':''}${todayHl}">${slot?`${SUBJECTS.find(s=>s.key===slot.subjectKey)?.icon||''}<br>${getSubjectLabel(slot.subjectKey).split(' ')[0]}`:'—'}</div>`;
    });
  });
  html+='</div></div>';
  document.getElementById('content').innerHTML=html;
}

function showNotices(){
  document.getElementById('page-title').textContent='Notices';
  document.getElementById('page-badge').textContent=`${NOTICES.length} notices`;
  const PRI={normal:'#1565C0',info:'#0F6E56',warn:'#D97706',alert:'#DC2626'};
const PRI_LBL={normal:'🔵 Normal',info:'🟢 Info',warn:'🟡 Warning',alert:'🔴 Alert'};
  document.getElementById('content').innerHTML=NOTICES.length?NOTICES.map(a=>`
    <div class="card" style="margin-bottom:10px;border-left:4px solid ${PRI[a.priority]||PRI.normal}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:.9rem;font-weight:600;color:var(--carbon)">${a.title}</span>
        <span style="font-size:.7rem;color:var(--carbon-soft);margin-left:auto">${formatDate(a.createdAt)}</span>
      </div>
      <div style="font-size:.83rem;color:var(--carbon-mid);line-height:1.65">${a.body}</div>
    </div>`).join('')
  :'<div class="empty-state"><div class="empty-icon">📢</div><div class="empty-title">No notices</div><div class="empty-sub">Check back later</div></div>';
}

function openStudentNav(){
  document.getElementById('stu-nav').style.left='0';
  document.getElementById('snav-overlay').style.display='block';
}
function closeStudentNav(){
  document.getElementById('stu-nav').style.left='-100%';
  document.getElementById('snav-overlay').style.display='none';
}
</script>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));</script>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-bottom-nav">
  <div class="mbn-items">
    <a href="#" class="mbn-item active" id="mbn-home"      onclick="showView('home',this);     setMbn('home');    return false;"><span class="mbn-icon">🏠</span>Home</a>
    <a href="#" class="mbn-item"        id="mbn-grades"    onclick="showView('grades',this);   setMbn('grades');  return false;"><span class="mbn-icon">📝</span>Grades</a>
    <a href="#" class="mbn-item"        id="mbn-timetable" onclick="showView('timetable',this);setMbn('timetable');return false;"><span class="mbn-icon">🗓️</span>Timetable</a>
    <a href="#" class="mbn-item"        id="mbn-notices"   onclick="showView('notices',this);  setMbn('notices'); return false;"><span class="mbn-icon">📢</span>Notices</a>
    <a href="#" class="mbn-item signout-btn" onclick="signOut();return false;"><span class="mbn-icon">🚪</span>Sign Out</a>
  </div>
</nav>
<script>
function setMbn(active){
  document.querySelectorAll('.mobile-bottom-nav .mbn-item').forEach(el=>{
    el.classList.toggle('active', el.id==='mbn-'+active);
  });
}
</script>

</body>
</html>
